<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f766e"/>
<title>Homeopathy Clinic PWA</title>
<style>
:root {
  --teal-50:#f0fdfa;--teal-100:#ccfbf1;--teal-200:#99f6e4;--teal-400:#2dd4bf;
  --teal-500:#14b8a6;--teal-600:#0d9488;--teal-700:#0f766e;--teal-800:#115e59;
  --slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-300:#cbd5e1;
  --slate-400:#94a3b8;--slate-500:#64748b;--slate-600:#475569;--slate-700:#334155;
  --slate-800:#1e293b;--slate-900:#0f172a;--slate-950:#020617;
  --rose-50:#fff1f2;--rose-100:#ffe4e6;--rose-500:#f43f5e;--rose-600:#e11d48;--rose-700:#be123c;
  --amber-50:#fffbeb;--amber-100:#fef3c7;--amber-600:#d97706;--amber-700:#b45309;
  --emerald-50:#ecfdf5;--emerald-100:#d1fae5;--emerald-600:#059669;--emerald-700:#047857;
  --indigo-50:#eef2ff;--indigo-600:#4f46e5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--slate-50);color:var(--slate-800);min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}
.hidden{display:none!important;}

/* LAYOUT */
#app{display:flex;min-height:100vh;}
#sidebar{width:256px;background:var(--slate-900);color:var(--slate-300);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s;-webkit-overflow-scrolling:touch;}
#main-area{flex:1;margin-left:256px;display:flex;flex-direction:column;min-height:100vh;}
#topbar{background:#fff;border-bottom:1px solid var(--slate-200);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
#content{flex:1;padding:24px;max-width:1200px;width:100%;margin:0 auto;}
.sidebar-brand{padding:20px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:12px;}
.brand-icon{width:40px;height:40px;background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.brand-name{font-size:13px;font-weight:900;color:#fff;letter-spacing:.5px;}
.brand-sub{font-size:10px;color:var(--teal-400);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
nav#sidebar-nav{flex:1;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:700;border:none;background:none;color:var(--slate-400);transition:all .2s;text-align:left;margin-bottom:2px;}
.nav-btn:hover{background:rgba(30,41,59,.5);color:var(--slate-200);}
.nav-btn.active{background:var(--teal-600);color:#fff;box-shadow:0 4px 12px rgba(13,148,136,.25);}
.nav-btn .nav-icon{font-size:16px;flex-shrink:0;}
.sidebar-footer{padding:16px;border-top:1px solid #1e293b;background:rgba(2,6,23,.4);}
.user-chip{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.user-avatar{width:36px;height:36px;border-radius:10px;background:rgba(13,148,136,.1);border:1px solid rgba(20,184,166,.2);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--teal-400);font-size:12px;}
.user-name{font-size:12px;font-weight:700;color:#fff;}
.user-role{font-size:10px;color:var(--slate-400);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.logout-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;border:1px solid #1e293b;background:rgba(15,23,42,.6);color:var(--slate-400);font-size:12px;font-weight:700;border-radius:12px;transition:all .2s;}
.logout-btn:hover{border-color:#334155;color:#f43f5e;}

/* TOPBAR */
.hamburger{display:none;background:none;border:1px solid var(--slate-200);border-radius:10px;padding:8px;color:var(--slate-600);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-clinic{display:none;font-size:13px;font-weight:900;color:var(--slate-800);text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.role-badge{width:32px;height:32px;background:var(--teal-50);border:1px solid var(--teal-100);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--teal-700);}
.sync-badge{font-size:10px;font-weight:700;color:var(--slate-400);background:var(--slate-50);border:1px solid var(--slate-100);padding:4px 10px;border-radius:8px;}

/* CARDS & COMMON */
.card{background:#fff;border:1px solid var(--slate-200);border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card-sm{background:#fff;border:1px solid var(--slate-200);border-radius:12px;padding:14px;}
.section-title{font-size:18px;font-weight:900;color:var(--slate-800);margin-bottom:4px;}
.section-sub{font-size:12px;color:var(--slate-500);font-weight:500;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;}
.badge-teal{background:var(--teal-50);color:var(--teal-700);}
.badge-rose{background:var(--rose-50);color:var(--rose-700);}
.badge-amber{background:var(--amber-50);color:var(--amber-700);}
.badge-emerald{background:var(--emerald-50);color:var(--emerald-700);}
.badge-indigo{background:var(--indigo-50);color:var(--indigo-600);}
.badge-slate{background:var(--slate-100);color:var(--slate-600);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;border:none;transition:all .2s;}
.btn-primary{background:var(--teal-600);color:#fff;}
.btn-primary:hover{background:var(--teal-700);}
.btn-secondary{background:var(--slate-100);color:var(--slate-600);border:1px solid var(--slate-200);}
.btn-secondary:hover{background:var(--slate-200);}
.btn-danger{background:var(--rose-50);color:var(--rose-700);border:1px solid var(--rose-100);}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:8px;}
.input{width:100%;padding:9px 12px;border:1px solid var(--slate-200);border-radius:10px;font-size:13px;outline:none;background:#fff;transition:border .2s;}
.input:focus{border-color:var(--teal-500);box-shadow:0 0 0 3px rgba(20,184,166,.1);}
.label{display:block;font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.form-group{margin-bottom:14px;}
.divider{height:1px;background:var(--slate-100);margin:16px 0;}
.empty-state{text-align:center;padding:48px 20px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:14px;font-weight:700;color:var(--slate-600);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--slate-400);}
.stat-card{background:#fff;border:1px solid var(--slate-200);border-radius:14px;padding:16px 20px;}
.stat-value{font-size:24px;font-weight:900;color:var(--slate-800);}
.stat-label{font-size:11px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.5px;}
.stat-icon{font-size:22px;margin-bottom:8px;}
.search-box{position:relative;}
.search-box input{padding-left:36px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--slate-400);}
.patient-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--slate-200);border-radius:12px;background:#fff;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.patient-row:hover{border-color:var(--teal-200);background:var(--teal-50);}
.patient-avatar{width:40px;height:40px;border-radius:10px;background:var(--teal-50);border:1px solid var(--teal-100);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--teal-600);font-size:14px;flex-shrink:0;}
.patient-name{font-size:13px;font-weight:800;color:var(--slate-800);}
.patient-meta{font-size:11px;color:var(--slate-400);font-weight:500;}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);-webkit-overflow-scrolling:touch;}
.modal-lg{max-width:820px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--slate-100);}
.modal-title{font-size:16px;font-weight:900;color:var(--slate-800);}
.close-btn{background:var(--slate-100);border:none;border-radius:8px;padding:6px 8px;font-size:16px;color:var(--slate-500);cursor:pointer;}
.tab-group{display:flex;background:var(--slate-100);border-radius:12px;padding:4px;margin-bottom:20px;}
.tab-btn{flex:1;padding:8px;border:none;background:none;border-radius:9px;font-size:12px;font-weight:700;color:var(--slate-500);transition:all .2s;cursor:pointer;}
.tab-btn.active{background:#fff;color:var(--teal-700);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.pipeline-steps{display:flex;align-items:center;gap:0;overflow-x:auto;padding:4px 0;}
.pipeline-step{display:flex;align-items:center;gap:4px;}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--slate-300);flex-shrink:0;}
.step-dot.done{background:var(--teal-500);}
.step-dot.active{background:var(--amber-600);box-shadow:0 0 0 3px rgba(217,119,6,.2);}
.step-label{font-size:9px;font-weight:700;color:var(--slate-400);white-space:nowrap;}
.step-line{width:20px;height:2px;background:var(--slate-200);}
.step-line.done{background:var(--teal-400);}
.alert{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
.alert-error{background:var(--rose-50);color:var(--rose-700);border:1px solid var(--rose-100);}
.alert-success{background:var(--emerald-50);color:var(--emerald-700);border:1px solid var(--emerald-100);}
.history-item{border:1px solid var(--slate-100);border-radius:12px;padding:14px;background:#fff;margin-bottom:10px;}
.hist-date{font-size:11px;font-weight:700;color:var(--teal-600);}
.hist-type{font-size:10px;font-weight:700;color:var(--slate-400);text-transform:uppercase;}
.rx-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--teal-50);border:1px solid var(--teal-100);border-radius:20px;font-size:11px;font-weight:700;color:var(--teal-700);margin:2px;}
.courier-card{border:1px solid var(--slate-200);border-radius:14px;padding:16px;background:#fff;margin-bottom:10px;transition:border .2s;}
.courier-card:hover{border-color:var(--teal-200);}
.billing-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--slate-100);border-radius:10px;background:#fff;margin-bottom:8px;}

/* LOGIN */
#login-screen{min-height:100vh;background:var(--slate-50);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-box{background:#fff;border:1px solid var(--slate-200);border-radius:24px;padding:32px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.08);}
.login-brand{text-align:center;margin-bottom:28px;}
.login-icon{width:64px;height:64px;background:var(--teal-50);border:2px solid var(--teal-100);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 12px;}
.login-title{font-size:22px;font-weight:900;color:var(--slate-800);}
.login-sub{font-size:13px;color:var(--slate-500);margin-top:4px;}
.pin-input{text-align:center;font-size:24px;letter-spacing:12px;font-weight:900;padding:12px;background:var(--slate-50);}
.sandbox-codes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--slate-100);}
.code-chip{background:var(--slate-50);border:1px solid var(--slate-100);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;}
.code-chip:hover{background:var(--teal-50);border-color:var(--teal-100);}
.code-label{font-size:10px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.5px;}
.code-val{font-size:16px;font-weight:900;color:var(--teal-600);font-family:monospace;margin-top:2px;}

/* MOBILE OVERLAY */
#mobile-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:90;}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #main-area{margin-left:0;}
  .hamburger{display:flex;align-items:center;}
  .topbar-clinic{display:block;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  #mobile-overlay.show{display:block;}
  #content{padding:14px;}
}
@media(max-width:480px){.modal{border-radius:16px;padding:16px;}.grid-2{grid-template-columns:1fr;}}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .25s ease;}
@keyframes ping{75%,100%{transform:scale(2);opacity:0;}}
.ping{animation:ping 1.2s cubic-bezier(0,0,.2,1) infinite;}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOADING SPLASH SCREEN -->
<div id="loading-screen" style="position:fixed;inset:0;background:var(--slate-50);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
  <div class="login-box" style="text-align:center;border:none;box-shadow:none;background:transparent;">
    <div class="login-icon" style="animation: spin 1s linear infinite;background:none;border:none;font-size:40px;margin-bottom:16px;">🔄</div>
    <div class="login-title" style="font-size:18px;">Connecting to Clinic Cloud...</div>
    <div class="login-sub" style="margin-top:8px;">Synchronizing medical records...</div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="hidden">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-icon">🏥</div>
      <div class="login-title" id="clinic-name-display">Homeopathy Clinic</div>
      <div class="login-sub">Practice Management Portal</div>
    </div>
    <div class="tab-group">
      <button class="tab-btn active" onclick="selectRole('doctor')">🩺 Doctor</button>
      <button class="tab-btn" onclick="selectRole('receptionist')">👤 Receptionist</button>
    </div>
    <div class="form-group">
      <label class="label" id="pin-label">Doctor Security PIN</label>
      <input class="input pin-input" type="password" id="pin-input" maxlength="4" placeholder="••••" oninput="this.value=this.value.replace(/\D/g,'')"/>
      <div style="text-align:center;font-size:11px;color:var(--slate-400);margin-top:6px;">Enter your 4-digit PIN</div>
    </div>
    <div id="login-error" class="alert alert-error hidden" style="margin-bottom:12px;">❌ Invalid PIN. Please try again.</div>
    <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="doLogin()">🔓 Enter Clinic</button>
    <div class="sandbox-codes">
      <div class="code-chip" onclick="quickFill('doctor','1234')">
        <div class="code-label">Doctor PIN</div>
        <div class="code-val">1234</div>
      </div>
      <div class="code-chip" onclick="quickFill('receptionist','4321')">
        <div class="code-label">Receptionist PIN</div>
        <div class="code-val">4321</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <!-- Mobile Overlay -->
  <div id="mobile-overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🏥</div>
      <div>
        <div class="brand-name" id="sb-clinic-name">Homeopathy Clinic</div>
        <div class="brand-sub">PWA Portal</div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sb-avatar">Dr</div>
        <div>
          <div class="user-name" id="sb-username">Doctor</div>
          <div class="user-role" id="sb-role">Doctor Role</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div id="main-area">
    <header id="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="topbar-clinic">🏥 Clinic</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" id="sync-now-btn" onclick="manualSyncNow()" style="font-size:11px;padding:5px 10px;height:32px;display:inline-flex;align-items:center;gap:4px;">🔄 Sync Now</button>
        <span class="badge badge-rose hidden" id="offline-badge" style="height:32px;display:inline-flex;align-items:center;">Offline Mode</span>
        <span class="sync-badge" id="sync-badge" style="display:none"></span>
        <div class="role-badge" id="tb-role-badge">Dr</div>
      </div>
    </header>
    <main id="content"></main>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
// ==================== CONFIG & SYNC CONFIG ====================
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsVI5Iz02B4I9pPh4laVolbiq-4dTe5CBbz7IythIyifkdeYEYfBGmwXxhO-J_R_DK/exec";

const KEYS={
  PATIENTS:'hom_patients',CASES:'hom_cases',COURIERS:'hom_couriers',
  BILLING:'hom_billing',APPOINTMENTS:'hom_appointments',MEDICINES:'hom_medicines',
  USER:'hom_user',SYNC:'hom_sync',SETTINGS:'hom_settings',PRESCRIPTIONS:'hom_prescriptions'
};

function ls(key){try{return JSON.parse(localStorage.getItem(key)||'null');}catch{return null;}}
function ss(key,val){localStorage.setItem(key,JSON.stringify(val));}

function getAll(key){return ls(key)||[];}
function saveAll(key,arr){ss(key,arr);}

function initDB(){
  if(!ls(KEYS.MEDICINES)) ss(KEYS.MEDICINES, DEFAULT_MEDICINES);
  if(!ls(KEYS.PATIENTS)) ss(KEYS.PATIENTS,[]);
  if(!ls(KEYS.CASES)) ss(KEYS.CASES,[]);
  if(!ls(KEYS.COURIERS)) ss(KEYS.COURIERS,[]);
  if(!ls(KEYS.BILLING)) ss(KEYS.BILLING,[]);
  if(!ls(KEYS.APPOINTMENTS)) ss(KEYS.APPOINTMENTS,[]);
  if(!ls(KEYS.PRESCRIPTIONS)) ss(KEYS.PRESCRIPTIONS,[]);
  if(!ls(KEYS.SYNC)) ss(KEYS.SYNC,{url:WEB_APP_URL,enabled:true});
  if(!ls(KEYS.SETTINGS)) ss(KEYS.SETTINGS,{clinicName:"Dr. Sharma's Homeopathy Clinic",doctorName:"Dr. Anjali Sharma",doctorPin:"1234",receptionistName:"Neha Deshmukh",receptionistPin:"4321"});
}

const DEFAULT_MEDICINES=[
  {id:'MED-001',name:'Arsenicum Album',potency:'30C',stock:15,minStock:5,category:'Dilution',price:150},
  {id:'MED-002',name:'Nux Vomica',potency:'200C',stock:8,minStock:5,category:'Dilution',price:180},
  {id:'MED-003',name:'Pulsatilla',potency:'30C',stock:12,minStock:4,category:'Dilution',price:150},
  {id:'MED-004',name:'Sulphur',potency:'200C',stock:8,minStock:3,category:'Dilution',price:160},
  {id:'MED-005',name:'Arnica Montana',potency:'Q',stock:20,minStock:6,category:'Mother Tincture',price:250},
  {id:'MED-006',name:'Lycopodium',potency:'1M',stock:5,minStock:5,category:'Dilution',price:220},
  {id:'MED-007',name:'Silicea',potency:'6X',stock:25,minStock:10,category:'Biochemic',price:120},
  {id:'MED-008',name:'Belladonna',potency:'30C',stock:10,minStock:4,category:'Dilution',price:140},
  {id:'MED-009',name:'Rhus Toxicodendron',potency:'200C',stock:7,minStock:3,category:'Dilution',price:170},
  {id:'MED-010',name:'Calcarea Carb',potency:'200C',stock:6,minStock:3,category:'Dilution',price:180},
  {id:'MED-011',name:'Natrum Mur',potency:'30C',stock:9,minStock:4,category:'Dilution',price:150},
  {id:'MED-012',name:'Phosphorus',potency:'200C',stock:4,minStock:3,category:'Dilution',price:190},
  {id:'MED-013',name:'Ignatia',potency:'200C',stock:6,minStock:3,category:'Dilution',price:160},
  {id:'MED-014',name:'Sepia',potency:'200C',stock:5,minStock:3,category:'Dilution',price:170},
  {id:'MED-015',name:'Thuja',potency:'1M',stock:3,minStock:2,category:'Dilution',price:210},
];

// ==================== SYNCHRONIZATION ENGINE ====================
let isOffline = false;

// Merge list of items. Item with higher updatedAt wins.
function mergeLists(localList, remoteList) {
  const mergedMap = new Map();
  // First load all remote items
  remoteList.forEach(item => {
    if (item && item.id) mergedMap.set(item.id, item);
  });
  // Then merge local items
  localList.forEach(item => {
    if (item && item.id) {
      const existing = mergedMap.get(item.id);
      if (!existing) {
        mergedMap.set(item.id, item);
      } else {
        const localTime = item.updatedAt || 0;
        const remoteTime = existing.updatedAt || 0;
        if (localTime >= remoteTime) {
          mergedMap.set(item.id, item);
        }
      }
    }
  });
  return Array.from(mergedMap.values());
}

async function loadFromGoogleSheets() {
  try {
    const res = await fetch(WEB_APP_URL + "?action=get_data", {
      method: "GET",
      headers: { "Accept": "application/json" }
    });
    if (!res.ok) throw new Error("GET response not ok");
    const data = await res.json();
    if (data && data.success !== false) {
      // Decode Prescriptions first so they can be attached to cases
      let mappedPrescriptions = [];
      if (Array.isArray(data.prescriptions)) {
        mappedPrescriptions = data.prescriptions.map(rx => ({
          caseId: rx.CaseID || rx.caseId || '',
          patientId: rx.PatientID || rx.patientId || '',
          name: rx.MedicineName || rx.name || '',
          potency: rx.Potency || rx.potency || '',
          dosage: rx.Dosage || rx.dosage || '',
          duration: rx.Duration || rx.duration || ''
        }));
        saveAll(KEYS.PRESCRIPTIONS, mappedPrescriptions);
      }

      // Decode Patients (Google Sheet PatientID/Name -> frontend id/name)
      if (Array.isArray(data.patients)) {
        const mappedPatients = data.patients.map(p => ({
          id: p.PatientID || p.id || '',
          name: p.Name || p.name || '',
          mobile: String(p.Mobile || p.mobile || ''),

        saveAll(KEYS.PATIENTS, mappedPatients);

      // Decode Cases and rebuild the prescriptions sub-array using Prescriptions sheet
      if (Array.isArray(data.cases)) {
        const mappedCases = data.cases.map(c => {
          const cid = c.CaseID || c.id || '';
          const rxs = mappedPrescriptions.filter(r => r.caseId === cid).map(r => ({
            name: r.name,

            visitType: c.VisitType || c.visitType || '',
            complaint: c.Complaint || c.complaint || '',
            duration: c.Duration || c.duration || '',

            updatedAt: c.updatedAt || Date.now()
          };
        });
        saveAll(KEYS.CASES, mappedCases);

      // Decode Couriers
      if (Array.isArray(data.couriers)) {
        const mappedCouriers = data.couriers.map(co => ({
          id: co.CourierID || co.id || '',
          patientId: co.PatientID || co.patientId || '',
          patientName: co.PatientName || co.patientName || '',
          mobile: String(co.Mobile || co.mobile || ''),
          address: co.Address || co.address || '',
          caseId: co.CaseID || co.caseId || '',
          status: co.Status || co.status || '',
          carrier: co.Carrier || co.carrier || '',
          tracking: co.Tracking || co.tracking || '',
          dispatchDate: co.DispatchDate || co.dispatchDate || '',
          deliveryDate: co.DeliveryDate || co.deliveryDate || '',
          createdAt: co.CreatedAt || co.createdAt || '',
          updatedAt: co.updatedAt || Date.now()
        }));
        saveAll(KEYS.COURIERS, mappedCouriers);
      }

      // Decode Billing
      if (Array.isArray(data.billing)) {
        const mappedBilling = data.billing.map(b => ({
          id: b.InvoiceID || b.id || '',
          patientId: b.PatientID || b.patientId || '',
          patientName: b.PatientName || b.patientName || '',
          date: b.Date || b.date || '',
          consultFee: parseFloat(b.ConsultFee || b.consultFee) || 0,

          courierCharge: parseFloat(b.CourierCharge || b.courierCharge) || 0,

          paymentStatus: b.PaymentStatus || b.paymentStatus || '',
          updatedAt: b.updatedAt || Date.now()

        saveAll(KEYS.BILLING, mappedBilling);

      // Decode Appointments
      if (Array.isArray(data.appointments)) {
        const mappedAppointments = data.appointments.map(a => ({
          id: a.AppointmentID || a.id || '',
          patientName: a.PatientName || a.patientName || '',
          mobile: String(a.Mobile || a.mobile || ''),
          date: a.Date || a.date || '',
          time: a.Time || a.time || '',
          type: a.Type || a.type || '',
          status: a.Status || a.status || '',
          notes: a.Notes || a.notes || '',
          updatedAt: a.updatedAt || Date.now()
        }));
        saveAll(KEYS.APPOINTMENTS, mappedAppointments);
      }

      // Decode Medicines
      if (Array.isArray(data.medicines)) {
        const mappedMedicines = data.medicines.map(m => ({
          id: m.MedicineID || m.id || '',
          name: m.Name || m.name || '',

          price: parseFloat(m.Price || m.price) || 0,
          updatedAt: m.updatedAt || Date.now()
        }));
        saveAll(KEYS.MEDICINES, mappedMedicines);
      }

      const sync = ls(KEYS.SYNC) || { url: WEB_APP_URL, enabled: true };
      sync.lastSync = new Date().toLocaleString('en-IN');
      ss(KEYS.SYNC, sync);

      isOffline = false;
      document.getElementById('offline-badge').classList.add('hidden');
      updateSyncBadge();
    }
  } catch (err) {
    console.error("Offline or error loading from Google Sheets:", err);
    isOffline = true;
    document.getElementById('offline-badge').classList.remove('hidden');
  }

  // Refresh current state
  if (currentUser) {
    buildNav();
    renderView();
  } else {
    const cfg = ls(KEYS.SETTINGS) || {};
    document.getElementById('clinic-name-display').textContent = cfg.clinicName || 'Homeopathy Clinic';
  }
}

      saveAll(KEYS.BILLING, mergedBilling);
      saveAll(KEYS.APPOINTMENTS, mergedAppointments);
      saveAll(KEYS.MEDICINES, mergedMedicines);
    }

    // 2. Prepare payload (always in camelCase, matching Apps Script expectations)
    const payload = {
      action: "sync_all",
      patients: getAll(KEYS.PATIENTS),
      cases: getAll(KEYS.CASES),
      couriers: getAll(KEYS.COURIERS),
      billing: getAll(KEYS.BILLING),
      appointments: getAll(KEYS.APPOINTMENTS),

    };

    // 3. Upload merged data
    await fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    isOffline = false;
    document.getElementById('offline-badge').classList.add('hidden');

    // 4. Reload latest from sheets
    await loadFromGoogleSheets();
  } catch (err) {
    console.error("Synchronization failed:", err);
    isOffline = true;
    document.getElementById('offline-badge').classList.remove('hidden');
  }

  ${lowStock>0?`<div class="card" style="border-color:var(--amber-100);">

function getGreeting(){

function filterPatients(){
  const q=document.getElementById('patient-search').value.toLowerCase();
  const all=getAll(KEYS.PATIENTS);
  const filtered=all.filter(p=>p.name.toLowerCase().includes(q)||p.mobile.includes(q)||p.id.toLowerCase().includes(q));
  renderPatientList(filtered);
}

function renderPatientList(patients){
  const el=document.getElementById('patient-list');
  if(!el)return;
  if(patients.length===0){
    el.innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No patients found</div><div class="empty-sub">Register your first patient to get started</div></div></div>`;
    return;
  }
  el.innerHTML=patients.map(p=>`
  <div class="patient-row" onclick="showPatientDetail('${p.id}')">
    <div class="patient-avatar">${patientInitials(p.name)}</div>
    <div style="flex:1;">
      <div class="patient-name">${p.name}</div>

}

async function savePatient(){
  const name=document.getElementById('p-name').value.trim();
  const mobile=document.getElementById('p-mobile').value.trim();
  const age=document.getElementById('p-age').value.trim();
  const gender=document.getElementById('p-gender').value;
  const err=document.getElementById('p-err');
  if(!name||!mobile||!age||!gender){err.textContent='Please fill required fields.';err.classList.remove('hidden');return;}
  const patients=getAll(KEYS.PATIENTS);
  const year=new Date().getFullYear();
  const id=`HOM-${year}-${(patients.length+1).toString().padStart(4,'0')}`;
  const p={
    id,name,mobile,age:parseInt(age),gender,
    address:document.getElementById('p-address').value,
    occupation:document.getElementById('p-occupation').value,
    bloodGroup:document.getElementById('p-blood').value,
    createdAt:today(),updatedAt:Date.now()
  };
  patients.unshift(p);
  saveAll(KEYS.PATIENTS,patients);
  closeModal();
  renderPatients();
  await syncToGoogleSheets();
}

async function updatePatient(pid){
  const patients=getAll(KEYS.PATIENTS);
  const idx=patients.findIndex(p=>p.id===pid);
  if(idx===-1)return;
  patients[idx]={...patients[idx],
    name:document.getElementById('ep-name').value,
    mobile:document.getElementById('ep-mobile').value,
    age:parseInt(document.getElementById('ep-age').value),
    gender:document.getElementById('ep-gender').value,
    address:document.getElementById('ep-address').value,
    occupation:document.getElementById('ep-occupation').value,
    bloodGroup:document.getElementById('ep-blood').value,
    updatedAt:Date.now()
  };
  saveAll(KEYS.PATIENTS,patients);
  closeModal();
  renderPatients();
  await syncToGoogleSheets();
}

function removeRxRow(n){
  const el=document.getElementById(`rx-row-${n}`);
  if(el)el.remove();
}

function collectRx(){
  const rxs=[];
  document.querySelectorAll('[id^="rx-row-"]').forEach(row=>{
    const n=row.id.split('-')[2];
    const name=document.getElementById(`rx-name-${n}`)?.value?.trim();
    if(name){
      rxs.push({
        name,
        potency:document.getElementById(`rx-potency-${n}`)?.value||'',
        dosage:document.getElementById(`rx-dosage-${n}`)?.value||'',
        duration:document.getElementById(`rx-duration-${n}`)?.value||'',
      });
    }
  });
  return rxs;
}

async function saveConsult(){
  const pid=document.getElementById('c-pid').value;
  const complaint=document.getElementById('c-complaint').value.trim();
  const err=document.getElementById('c-err');
  if(!pid){err.textContent='Please select a patient.';err.classList.remove('hidden');return;}
  if(!complaint){err.textContent='Chief complaint is required.';err.classList.remove('hidden');return;}
  const visitType=document.querySelector('input[name="vtype"]:checked').value;
  const prescriptions=collectRx();
  const fee=parseFloat(document.getElementById('c-fee').value)||0;
  const medCharge=parseFloat(document.getElementById('c-medcharge').value)||0;
  const courierCharge=visitType==='online'?(parseFloat(document.getElementById('c-couriercharge').value)||0):0;
  const payStatus=document.getElementById('c-paystatus').value;
  const caseId='REC-'+Date.now();

  const consult={
    id:caseId,patientId:pid,date:today(),visitType,
    complaint,duration:document.getElementById('c-duration').value,
    notes:document.getElementById('c-notes').value,
    prescriptions,
    followUpDate:document.getElementById('c-followup').value||'',
    payStatus,fee,medCharge,courierCharge,
    updatedAt:Date.now()
  };
  const cases=getAll(KEYS.CASES);
  cases.unshift(consult);
  saveAll(KEYS.CASES,cases);

  // Billing entry
  const p=getAll(KEYS.PATIENTS).find(pt=>pt.id===pid);
  const total=fee+medCharge+courierCharge;
  if(total>0){
    const bills=getAll(KEYS.BILLING);
    const year=new Date().getFullYear();
    bills.unshift({
      id:`INV-${year}-${(bills.length+1).toString().padStart(4,'0')}`,
      patientId:pid,patientName:p?.name||'',date:today(),
      consultFee:fee,medCharge,courierCharge,total,
      payMode:document.getElementById('c-paymode').value,
      paymentStatus:payStatus,
      updatedAt:Date.now()
    });
    saveAll(KEYS.BILLING,bills);
  }

  // Courier entry for online
  if(visitType==='online'&&prescriptions.length>0){
    const couriers=getAll(KEYS.COURIERS);
    couriers.unshift({
      id:'COU-'+(couriers.length+1).toString().padStart(3,'0'),
      patientId:pid,patientName:p?.name||'',mobile:p?.mobile||'',
      address:document.getElementById('c-shipaddr').value,
      caseId,status:'Prescription Ready',
      dispatchDate:'',deliveryDate:'',carrier:'',tracking:'',notes:'',
      createdAt:today(),
      updatedAt:Date.now()
    });
    saveAll(KEYS.COURIERS,couriers);
  }

  navParam=null;
  navigate('patients');
  setTimeout(()=>alert('✅ Consultation saved successfully!'),100);
  await syncToGoogleSheets();
}

function filterCouriers(){
  const q=document.getElementById('courier-search')?.value.toLowerCase()||'';
  const sf=document.getElementById('courier-status-filter')?.value||'All';
  const couriers=getAll(KEYS.COURIERS);
  const filtered=couriers.filter(c=>{
    const mq=c.patientName.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||(c.tracking||'').toLowerCase().includes(q);
    const ms=sf==='All'||c.status===sf;
    return mq&&ms;
  });

function renderCourierList(couriers){
  const el=document.getElementById('courier-list');
  if(!el)return;
  if(couriers.length===0){
    el.innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No couriers found</div><div class="empty-sub">Online consultations will create courier entries automatically</div></div></div>`;
    return;
  }
  el.innerHTML=couriers.map(c=>{
    const sIdx=COURIER_PIPELINE.indexOf(c.status);
    const isDone=c.status==='Delivered';
    return`<div class="courier-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-size:13px;font-weight:800;">${c.patientName} <span style="font-family:monospace;font-size:10px;color:var(--slate-400);">${c.id}</span></div>
          <div style="font-size:11px;color:var(--slate-400);">${c.mobile} · ${fmtDate(c.createdAt)}</div>
        </div>
        <span class="badge ${isDone?'badge-emerald':sIdx>=3?'badge-indigo':'badge-amber'}">${c.status}</span>
      </div>

      <!-- Pipeline Steps -->
      <div class="pipeline-steps" style="margin-bottom:12px;">
        ${COURIER_PIPELINE.map((s,i)=>`
          <div class="pipeline-step">
            <div>
              <div class="step-dot ${i<sIdx?'done':i===sIdx?'active':''}"></div>
              <div class="step-label">${s.replace(' ','\n')}</div>
            </div>
            ${i<COURIER_PIPELINE.length-1?`<div class="step-line ${i<sIdx?'done':''}"></div>`:''}
          </div>`).join('')}
      </div>

      ${c.address?`<div style="font-size:11px;color:var(--slate-500);margin-bottom:8px;">📍 ${c.address}</div>`:''}
      ${c.carrier?`<div style="font-size:11px;color:var(--indigo-600);margin-bottom:8px;font-weight:700;">🚚 ${c.carrier} · #${c.tracking}</div>`:''}

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <button class="btn btn-secondary btn-sm" onclick="showCourierEdit('${c.id}')">✏️ Tracking Info</button>
        <button class="btn btn-secondary btn-sm" onclick="sendCourierWA('${c.id}')">💬 WhatsApp</button>
        ${!isDone?`<button class="btn btn-primary btn-sm" onclick="progressCourier('${c.id}')">▶ Move to: ${COURIER_PIPELINE[sIdx+1]}</button>`:'<span class="badge badge-emerald">✅ Delivered</span>'}
      </div>
    </div>`;
  }).join('');
}

async function progressCourier(id){
  const couriers=getAll(KEYS.COURIERS);
  const idx=couriers.findIndex(c=>c.id===id);
  if(idx===-1)return;
  const sIdx=COURIER_PIPELINE.indexOf(couriers[idx].status);
  if(sIdx<COURIER_PIPELINE.length-1){
    couriers[idx].status=COURIER_PIPELINE[sIdx+1];
    if(couriers[idx].status==='Courier Dispatched')couriers[idx].dispatchDate=today();
    if(couriers[idx].status==='Delivered')couriers[idx].deliveryDate=today();
    couriers[idx].updatedAt=Date.now();
    saveAll(KEYS.COURIERS,couriers);
    renderCourier();
    await syncToGoogleSheets();
  }
}

function sendCourierWA(id){
  const c=getAll(KEYS.COURIERS).find(x=>x.id===id);
  if(!c)return;
  const cfg=ls(KEYS.SETTINGS)||{};
  const drName=cfg.doctorName||'Doctor';
  const clinicName=cfg.clinicName||'Homeopathy Clinic';
  const phone=c.mobile.startsWith('91')?c.mobile:'91'+c.mobile;
  let msg='';
  switch(c.status){
    case 'Prescription Ready': msg=`Namaskar ${c.patientName}, your homeopathic prescription has been prepared by ${drName}. We are packing your medicines. Thank you!`; break;
    case 'Packing Pending':
    case 'Courier Pending': msg=`Hello ${c.patientName}, your medicine parcel is being packed and will be dispatched shortly from ${clinicName}.`; break;
    case 'Courier Dispatched': msg=`Hello ${c.patientName}, your medicine has been dispatched via ${c.carrier||'Courier'}. Tracking No: ${c.tracking||'Pending'}. Please reach us for any queries.`; break;
    case 'Delivered': msg=`Namaskar ${c.patientName}, your medicine has been delivered. Please contact ${clinicName} for dosage guidance. Get well soon! 🙏`; break;
  }
  window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`, '_blank');
}

    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="grid-2">
    <div class="form-group"><label class="label">Medicine Name *</label><input class="input" id="am-name" placeholder="e.g. Arsenicum Album"/></div>
    <div class="form-group"><label class="label">Potency</label><input class="input" id="am-potency" placeholder="30C, 200C, 1M, Q"/></div>
    <div class="form-group"><label class="label">Category</label>
      <select class="input" id="am-cat">
        <option>Dilution</option><option>Mother Tincture</option><option>Trituration</option><option>Biochemic</option><option>Patents</option>
      </select>
    </div>
    <div class="form-group"><label class="label">Stock Count</label><input class="input" type="number" id="am-stock" placeholder="0"/></div>
    <div class="form-group"><label class="label">Min Stock Alert</label><input class="input" type="number" id="am-min" placeholder="5"/></div>
    <div class="form-group"><label class="label">Price (₹)</label><input class="input" type="number" id="am-price" placeholder="0"/></div>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" style="flex:1;" onclick="saveMedicine()">💾 Add</button>
  </div>`);
}

async function saveMedicine(){
  const name=document.getElementById('am-name').value.trim();
  if(!name)return alert('Medicine name required!');
  const meds=getAll(KEYS.MEDICINES);
  meds.push({
    id:`MED-${(meds.length+1).toString().padStart(3,'0')}`,
    name,potency:document.getElementById('am-potency').value,
    category:document.getElementById('am-cat').value,
    stock:parseInt(document.getElementById('am-stock').value)||0,
    minStock:parseInt(document.getElementById('am-min').value)||5,
    price:parseFloat(document.getElementById('am-price').value)||0,
    updatedAt:Date.now()
  });
  saveAll(KEYS.MEDICINES,meds);
  closeModal();
  renderInventory();
  await syncToGoogleSheets();
}

function showEditMed(id){
  const m=getAll(KEYS.MEDICINES).find(x=>x.id===id);
  if(!m)return;
  showModal(`
  <div class="modal-header">
    <div class="modal-title">✏️ Edit Medicine</div>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="grid-2">
    <div class="form-group"><label class="label">Medicine Name</label><input class="input" id="em-name" value="${m.name}"/></div>
    <div class="form-group"><label class="label">Potency</label><input class="input" id="em-potency" value="${m.potency}"/></div>
    <div class="form-group"><label class="label">Stock Count</label><input class="input" type="number" id="em-stock" value="${m.stock}"/></div>
    <div class="form-group"><label class="label">Min Stock Alert</label><input class="input" type="number" id="em-min" value="${m.minStock}"/></div>
    <div class="form-group"><label class="label">Price (₹)</label><input class="input" type="number" id="em-price" value="${m.price}"/></div>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" style="flex:1;" onclick="updateMed('${id}')">💾 Save</button>
  </div>`);
}

async function updateMed(id){
  const meds=getAll(KEYS.MEDICINES);
  const idx=meds.findIndex(m=>m.id===id);
  if(idx===-1)return;
  meds[idx]={
    ...meds[idx],
    name:document.getElementById('em-name').value,
    potency:document.getElementById('em-potency').value,
    stock:parseInt(document.getElementById('em-stock').value)||0,
    minStock:parseInt(document.getElementById('em-min').value)||5,
    price:parseFloat(document.getElementById('em-price').value)||0,
    updatedAt:Date.now()
  };
  saveAll(KEYS.MEDICINES,meds);
  closeModal();
  renderInventory();
  await syncToGoogleSheets();
}

// ==================== APPOINTMENTS ====================
function renderAppointments(){
  const appts=getAll(KEYS.APPOINTMENTS);
  const todayAppts=appts.filter(a=>a.date===today()&&a.status!=='Cancelled');
  document.getElementById('content').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
    <div>
      <div class="section-title">📅 Appointments</div>
      <div class="section-sub">${todayAppts.length} today · ${appts.length} total</div>
    </div>
    <button class="btn btn-primary" onclick="showAddAppointment()">➕ Book Appointment</button>
  </div>
  <div class="tab-group" style="max-width:400px;margin-bottom:16px;">
    <button class="tab-btn active" id="apt-today-btn" onclick="filterAppts('today')">Today (${todayAppts.length})</button>
    <button class="tab-btn" id="apt-all-btn" onclick="filterAppts('all')">All</button>
    <button class="tab-btn" id="apt-upcoming-btn" onclick="filterAppts('upcoming')">Upcoming</button>
  </div>
  <div id="appt-list"></div>`;
  filterAppts('today');
}

function filterAppts(mode){
  document.querySelectorAll('#app .tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('apt-'+mode+'-btn')?.classList.add('active');
  const appts=getAll(KEYS.APPOINTMENTS);
  let filtered=appts;
  if(mode==='today')filtered=appts.filter(a=>a.date===today());
  else if(mode==='upcoming')filtered=appts.filter(a=>a.date>=today()&&a.status==='Scheduled');
  renderApptList(filtered);
}

function renderApptList(appts){
  const el=document.getElementById('appt-list');
  if(!el)return;
  if(appts.length===0){el.innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No appointments</div><div class="empty-sub">Book an appointment to get started</div></div></div>`;return;}
  el.innerHTML=appts.sort((a,b)=>a.date.localeCompare(b.date)).map(a=>`
  <div class="billing-row" style="margin-bottom:8px;">
    <div style="flex:1;">
      <div style="font-size:12px;font-weight:800;">${a.patientName}</div>
      <div style="font-size:11px;color:var(--slate-400);">${a.mobile} · ${fmtDate(a.date)} ${a.time?'· '+a.time:''}</div>
      <div style="margin-top:4px;"><span class="badge badge-teal">${a.type}</span></div>
    </div>
    <div style="text-align:right;">
      <span class="badge ${a.status==='Completed'?'badge-emerald':a.status==='Cancelled'?'badge-rose':'badge-amber'}">${a.status}</span>
      <div style="display:flex;gap:4px;margin-top:6px;justify-content:flex-end;">
        ${a.status==='Scheduled'?`<button class="btn btn-primary btn-sm" onclick="updateApptStatus('${a.id}','Completed')">✅</button><button class="btn btn-danger btn-sm" onclick="updateApptStatus('${a.id}','Cancelled')">✕</button>`:''}
      </div>
    </div>
  </div>`).join('');
}

function showAddAppointment(){
  const patients=getAll(KEYS.PATIENTS);
  showModal(`
  <div class="modal-header">
    <div class="modal-title">📅 Book Appointment</div>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="form-group"><label class="label">Patient Name *</label>
    <input class="input" id="na-pname" placeholder="Patient name" list="na-plist"/>
    <datalist id="na-plist">${patients.map(p=>`<option value="${p.name} (${p.mobile})" data-pid="${p.id}">`).join('')}</datalist>
    <input type="hidden" id="na-pid"/>
  </div>
  <div class="form-group"><label class="label">Mobile</label><input class="input" id="na-mobile" placeholder="Mobile number"/></div>
  <div class="grid-2">
    <div class="form-group"><label class="label">Date *</label><input class="input" type="date" id="na-date" value="${today()}"/></div>
    <div class="form-group"><label class="label">Time Slot</label><input class="input" type="time" id="na-time"/></div>
    <div class="form-group"><label class="label">Type</label>
      <select class="input" id="na-type">
        <option>Consultation</option><option>Follow-up</option><option>Online Call</option><option>Courier Request</option>
      </select>
    </div>
  </div>
  <div class="form-group"><label class="label">Notes</label><input class="input" id="na-notes" placeholder="Any special notes"/></div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" style="flex:1;" onclick="saveAppt()">💾 Book</button>
  </div>`);
}

async function saveAppt(){
  const pname=document.getElementById('na-pname').value.trim();
  const date=document.getElementById('na-date').value;
  if(!pname||!date)return alert('Name and date required!');
  const appts=getAll(KEYS.APPOINTMENTS);
  appts.push({
    id:'APP-'+Date.now(),
    patientName:pname.split('(')[0].trim(),
    mobile:document.getElementById('na-mobile').value,
    date,time:document.getElementById('na-time').value,
    type:document.getElementById('na-type').value,
    status:'Scheduled',
    notes:document.getElementById('na-notes').value,
    updatedAt:Date.now()
  });
  saveAll(KEYS.APPOINTMENTS,appts);
  closeModal();
  renderAppointments();
  await syncToGoogleSheets();
}

async function updateApptStatus(id,status){
  const appts=getAll(KEYS.APPOINTMENTS);
  const idx=appts.findIndex(a=>a.id===id);
  if(idx!==-1){
    appts[idx].status=status;
    appts[idx].updatedAt=Date.now();
    saveAll(KEYS.APPOINTMENTS,appts);
    renderAppointments();
    await syncToGoogleSheets();
  }
}

// ==================== SETTINGS ====================
function renderSettings(){
  const cfg=ls(KEYS.SETTINGS)||{};
  const sync=ls(KEYS.SYNC)||{};
  document.getElementById('content').innerHTML=`
  <div style="margin-bottom:20px;">
    <div class="section-title">⚙️ Settings</div>
    <div class="section-sub">Clinic info, PIN management, and Google Sheets sync</div>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div style="font-size:14px;font-weight:800;color:var(--slate-700);margin-bottom:16px;">🏥 Clinic Information</div>
    <div class="grid-2">
      <div class="form-group"><label class="label">Clinic Name</label><input class="input" id="cfg-clinic" value="${cfg.clinicName||''}"/></div>
      <div class="form-group"><label class="label">Doctor Name</label><input class="input" id="cfg-doctor" value="${cfg.doctorName||''}"/></div>
    </div>
    <div style="font-size:13px;font-weight:800;color:var(--slate-700);margin:16px 0 12px;">🔐 Access PINs</div>
    <div class="grid-2">
      <div class="form-group"><label class="label">Doctor PIN (4 digits)</label><input class="input" type="password" id="cfg-dpin" value="${cfg.doctorPin||'1234'}" maxlength="4"/></div>
      <div class="form-group"><label class="label">Receptionist PIN (4 digits)</label><input class="input" type="password" id="cfg-rpin" value="${cfg.receptionistPin||'4321'}" maxlength="4"/></div>
      <div class="form-group"><label class="label">Receptionist Name</label><input class="input" id="cfg-rname" value="${cfg.receptionistName||''}"/></div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">💾 Save Clinic Settings</button>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:800;color:var(--slate-700);margin-bottom:8px;">📊 Google Sheets Sync</div>
    <div style="font-size:12px;color:var(--slate-500);margin-bottom:16px;">Data locally saves on this device. Enable sync to backup to Google Sheets automatically.</div>
    <div class="form-group"><label class="label">Apps Script Web App URL</label>
      <input class="input" id="cfg-syncurl" value="${sync.url||WEB_APP_URL}" placeholder="https://script.google.com/macros/s/.../exec"/>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;">
        <input type="checkbox" id="cfg-sync-enabled" ${sync.enabled?'checked':''} style="width:16px;height:16px;accent-color:var(--teal-600);"/>
        Enable Auto Sync on Save
      </label>
    </div>
    ${sync.lastSync?`<div class="alert alert-success" style="margin-bottom:12px;">✅ Last synced: ${sync.lastSync}</div>`:''}
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="saveSyncConfig()">💾 Save Sync Config</button>
      <button class="btn btn-secondary" id="manual-sync-btn" onclick="manualSync()">🔄 Sync Now</button>
    </div>
  </div>
  `;
}

async function saveSettings(){
  const cfg={
    clinicName:document.getElementById('cfg-clinic').value,
    doctorName:document.getElementById('cfg-doctor').value,
    doctorPin:document.getElementById('cfg-dpin').value||'1234',
    receptionistPin:document.getElementById('cfg-rpin').value||'4321',
    receptionistName:document.getElementById('cfg-rname').value,
    updatedAt:Date.now()
  };
  ss(KEYS.SETTINGS,cfg);
  document.getElementById('sb-clinic-name').textContent=cfg.clinicName||'Clinic';
  alert('✅ Settings saved! New PINs active from next login.');
  await syncToGoogleSheets();
}

function saveSyncConfig(){
  const sync={
    url:document.getElementById('cfg-syncurl').value,
    enabled:document.getElementById('cfg-sync-enabled').checked
  };
  ss(KEYS.SYNC,sync);
  updateSyncBadge();
  alert('✅ Sync config saved!');
}

async function manualSync(){
  const btn = document.getElementById('manual-sync-btn');
  if (btn) btn.disabled = true;
  await loadFromGoogleSheets();
  if (btn) btn.disabled = false;
  alert('✅ Sync completed!');
}

// ==================== MODAL ====================
function showModal(html, extraClass=''){
  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" onclick="closeModalOverlay(event)">
    <div class="modal ${extraClass} fade-in">${html}</div>
  </div>`;
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function closeModalOverlay(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

// ==================== INITIAL STARTUP ====================
async function initAppStartup() {
  initDB();
  
  // Immediately download latest data from Google Sheets on start (Requirement 3)
  await loadFromGoogleSheets();
  
  // Hide loading screen and display proper UI after download completes
  const loader = document.getElementById('loading-screen');
  if (loader) loader.classList.add('hidden');
  
  const savedUser=ls(KEYS.USER);
  if(savedUser){
    currentUser=savedUser;
    document.getElementById('login-screen').classList.add('hidden');
    startApp();
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
  }
}

initAppStartup();
</script>
</body>
</html>
